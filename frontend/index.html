<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSRF Vulnerable Blog</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .login-container { max-width: 300px; margin: 100px auto; padding: 20px; border: 1px solid #ccc; background: #f9f9f9;}
        .app-container { display: none; gap: 20px; }
        .editor-pane { flex: 1; }
        .preview-pane { flex: 1; border: 1px solid #ccc; display: flex; flex-direction: column;}
        iframe { width: 100%; height: 500px; border: none; background: #fff;}
        input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box;}
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none;}
        .post { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px;}
        .post-author { color: #555; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-container">
        <h2>Login</h2>
        <input type="text" id="loginUser" placeholder="Username (e.g., alice)">
        <input type="password" id="loginPass" placeholder="Password (e.g., alice123)">
        <button onclick="login()">Login</button>
        <p id="loginError" style="color:red; display:none;">Invalid credentials</p>
    </div>

    <div id="mainApp" class="app-container">
        <div class="editor-pane">
            <h2>Welcome, <span id="displayUser"></span>!</h2>
            <button onclick="logout()" style="background: #dc3545; margin-bottom: 20px;">Logout</button>
            
            <h3>Create a New Post</h3>
            <input type="text" id="title" placeholder="Post Title">
            <textarea id="content" rows="4" placeholder="Write your content here..."></textarea>
            
            <label>Attach an External URL (Preview loads in frame):</label>
            <input type="text" id="url" placeholder="http://example.com">
            
            <button onclick="submitPost()">Submit Post</button>

            <h3>Community Feed</h3>
            <div id="feed"></div>
        </div>

        <div class="preview-pane">
            <h3 style="padding: 10px; margin: 0; background: #eee; border-bottom: 1px solid #ccc;">Live Website Preview</h3>
            <iframe id="previewFrame"></iframe>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('username');

        // Check login state on load
        if (currentUser) {
            showApp();
        }

        function login() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if(data.username) {
                    currentUser = data.username;
                    localStorage.setItem('username', currentUser);
                    showApp();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            });
        }

        function logout() {
            localStorage.removeItem('username');
            currentUser = null;
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
        }

        function showApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('displayUser').innerText = currentUser;
            loadPosts();
        }

        // Trigger iframe URL preview on blur
        document.getElementById('url').addEventListener('blur', function() {
            const url = this.value;
            console.log("blur received");
            if(!url) return;
            
            // By setting the iframe src to our backend API, the backend fetches the site
            // and the iframe visually renders the returned HTML.
            document.getElementById('previewFrame').src = `/api/preview?url=${encodeURIComponent(url)}`;
        });

        function submitPost() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const url = document.getElementById('url').value;

            fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser, title, content, url })
            }).then(() => {
                alert("Post Submitted!");
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
                document.getElementById('url').value = '';
                document.getElementById('previewFrame').srcdoc = "<p>Preview cleared.</p>";
                loadPosts();
            });
        }

        function loadPosts() {
            fetch('/api/posts')
                .then(res => res.json())
                .then(data => {
                    const feed = document.getElementById('feed');
                    feed.innerHTML = '';
                    data.forEach(post => {
                        feed.innerHTML += `<div class="post">
                            <h4>${post.title}</h4>
                            <p>${post.content}</p>
                            <span class="post-author">Posted by: <b>${post.username}</b></span><br>
                            <i>Attached URL: <a href="${post.url}" target="_blank">${post.url}</a></i>
                        </div>`;
                    });
                });
        }
    </script>
</body>
</html>
